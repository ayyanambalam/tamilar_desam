name: tamilar_desam
description: "தமிழர் தேசம் (Tamilar Desam) - Political campaign & party management app"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # UI / Navigation / State
  go_router: ^14.2.7
  flutter_riverpod: ^2.6.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1
  share_plus: ^10.0.3
  url_launcher: ^6.3.0

  # Media / Files
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

  # QR / PDF Membership Card
  qr_flutter: ^4.1.0
  pdf: ^3.11.0
  printing: ^5.13.3

  # Charts / Export
  fl_chart: ^0.69.0
  csv: ^6.0.0
  excel: ^4.0.6

  # Offline / Sync helpers
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.5

  # IDs / Security helpers
  uuid: ^4.5.1
  crypto: ^3.0.5
  encrypt: ^5.0.3

  # Firebase (recommended backend)
  firebase_core: ^3.5.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
  # NOTE: Add Tamil fonts here if you want a fixed brand font.
  # fonts:
  #   - family: NotoSansTamil
  #     fonts:
  #       - asset: assets/fonts/NotoSansTamil-Regular.ttf
